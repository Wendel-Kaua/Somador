<!DOCTYPE html>
<html lang="pt-br"> <!-- Define o idioma da página como português do Brasil -->
<head>
    <meta charset="UTF-8"> <!-- Define codificação de caracteres (acentos e símbolos) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Faz o site ser responsivo -->
    <title>Somador</title> <!-- Título da aba do navegador -->

    <style>
        #telas{
            display: flex;
            width:700px; /* Cada tela ocupa exatamente a largura da calculadora.*/

            transition:transform 1s ease; /* Cria uma animação suave ao trocar de tela */
        }
        .tela {
            width:350px; /* deixa as duas 'telas' com a mesma largura. */
            flex-shrink:0; /* Impede que a tela diminua de tamanho dentro do Flexbox */
        }
        p {
            font: normal 20pt Arial; /* Define fonte dos parágrafos */
        }

        body {
            background-color: rgba(137, 255, 229, 0.6); /* Cor de fundo da página */
        }

        #titulo {
            border-radius: 10px; /* Adiciona uma borda de 10px*/
            text-align: center; /* Centraliza o texto */
            height: 40px; /* Altura do elemento */
            background-color: rgb(0, 255, 225); /* Cor de fundo do título */
            margin: 29px; /* Espaço externo ao redor */
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.589); /* Adiciona sombra */
            margin-top: 10px; /* adiciona um espaço de 10px acima do elemento, empurrando ele para baixo */
        }

        input {
            font: normal 15pt Arial; /* Fonte dos inputs */
            border-radius: 10px; /* Bordas arredondadas */
            border: 2px solid black; /* Borda preta */
        }

        #res, #resDiv {
            width: 220px; /* Largura da caixa de resultado */
            height: 35px; /* Altura da caixa */
            margin: 15px auto; /* Centraliza horizontalmente e dá espaçamento */
            padding: 8px; /* Espaço interno */
            border: 2px solid black; /* Borda da caixa */
            border-radius: 10px; /* Cantos arredondados */
            background-color: white; /* Fundo branco */
            font: normal 15pt Arial; /* Fonte do texto */
            text-align: center; /* Centraliza texto horizontalmente */
            line-height: 35px; /* Centraliza texto verticalmente */
        }

        #calculadora {
            text-align: center; /* Centraliza conteúdo interno */
            width: 350px; /* Largura da calculadora */
            margin: 55px auto; /* Centraliza na tela e dá espaço em cima/baixo */
            background-color: white; /* Fundo branco */
            padding: 20px; /* Espaço interno */
            border-radius: 15px; /* Bordas arredondadas */
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.591); /* Sombra ao redor */
            width:350px; /* A calculadora "corta" o que sai para fora. */
            overflow:hidden; /* Esconde qualquer conteúdo que ultrapasse os limites da calculadora */
        }

        #button {
            text-align: center; /* Centraliza os botões */
            margin-top: 20px; /* Espaço acima dos botões */
        }
    </style>
</head>

<body>
<div id="calculadora"> <!-- Caixa principal da calculadora -->
    <div id="telas"> <!-- Contém todas as telas da calculadora -->
        <!-- ================= TELA 1 - SOMA ================= -->
        <div class="tela"> <!-- Primeira tela (Somador) -->
            <h1 id="titulo">Somador</h1> <!-- Título da tela -->
            <input type="number" name="txtn1" id="txtn1"> <!-- Primeiro número -->
            <p>+</p> <!-- Símbolo da operação -->
            <input type="number" name="txtn2" id="txtn2"> <!-- Segundo número -->
            <div id="button"> <!-- Agrupa os botões -->
                <input type="button" value="Somar" onclick="somar()">
                <!-- Executa a função que realiza a soma -->
                <input type="button" value="Divisão" onclick="mudarTela()">
                <!-- Troca para a tela de divisão -->
                <input type="button" value="Limpar" onclick="limpar()">
                <!-- Limpa os campos da tela de soma -->
            </div>
            <div id="res">Resultado</div>
            <!-- Exibe o resultado da soma -->
        </div>
        <!-- ================= TELA 2 - DIVISÃO ================= -->
        <div class="tela"> <!-- Segunda tela (Divisão) -->
            <h1 id="titulo">Divisão</h1> <!-- Título da tela -->
            <input type="number" name="txtd1" id="txtd1">
            <!-- Primeiro número da divisão -->
            <p>÷</p> <!-- Símbolo da divisão -->
            <input type="number" name="txtd2" id="txtd2">
            <!-- Segundo número da divisão -->
            <div id="button"> <!-- Agrupa os botões -->
                <input type="button" value="Dividir" onclick="dividir()">
                <!-- Executa a função de divisão -->
                <input type="button" value="Somador" onclick="voltarTela()">
                <!-- Retorna para a tela de soma -->
                <input type="button" value="Limpar" onclick="limparDivisao()">
                <!-- Limpa os campos da tela de divisão -->
            </div>
            <div id="resDiv">Resultado</div>
            <!-- Exibe o resultado da divisão -->
        </div>
    </div>
</div>

    <script>
        var res = document.getElementById('res') // pega a div do resultado
        var tn1 = document.getElementById('txtn1') // pega input do primeiro número
        var tn2 = document.getElementById('txtn2') // pega input do segundo número

        var td1 = document.getElementById('txtd1') // Obtém o primeiro campo da divisão
        var td2 = document.getElementById('txtd2') // obtém o segundo campo da divisão
        var resDiv = document.getElementById('resDiv') // Obtém a caixa onde será exibido o resultado da divisão

        function somar(){ // função que realiza a soma
            var n1 = Number(tn1.value) // converte valor do input 1 para número
            var n2 = Number(tn2.value) // converte valor do input 2 para número
            var s = n1 + n2 // realiza a soma
            if (tn1.value === '' || tn2.value === '' ) { // se um dois campos estiverem 
                res.innerText = 'Digite um valor valido' // vazios, ele retorna 'Digite um valor valido'
                return // faz a função ser interrompida
            }

            res.innerText = `${s}` // mostra resultado na tela
        }

        function limpar(){ // função para limpar campos
            res.innerHTML = 'Resultado' // volta texto original do resultado
            tn1.value = '' // limpa input 1
            tn2.value = '' // limpa input 2
            tn1.focus() // coloca o cursor automaticamente no primeiro campo
        }

        const telas = document.getElementById("telas"); // Seleciona o contêiner que possui todas as telas da calculadora

        function mudarTela(){ // Move o contêiner para a esquerda, exibindo a tela de divisão
            telas.style.transform = "translateX(-350px)";
        }

        function voltarTela(){ // Retorna o contêiner para a posição inicial, exibindo novamente a tela de soma
            telas.style.transform = "translateX(0)";
        }

        function dividir() { // Função responsável por realizar a divisão
            var nd1 = Number(td1.value) // Converte o primeiro valor para número
            var nd2 = Number(td2.value) // Converte o segundo valor para número
            var r = nd1 / nd2 // Calcula o resultado da divisão
            if (td1.value === '' || td2.value === '') { // Verifica se algum campo está vazio
                resDiv.innerText = 'Digite um valor valido' // Exibe uma mensagem de erro
                return // Encerra a função para evitar o cálculo
            }

            // Futuramente pode ser adicionada uma verificação para impedir divisão por zero.
            
            resDiv.innerText = `${r}` // Exibe o resultado da divisão
        }
        function limparDivisao(){ // função para limpar campos
            resDiv.innerHTML = 'Resultado' // volta texto original do resultado
            td1.value = '' // limpa input 1
            td2.value = '' // limpa input 2
            td1.focus() // coloca o cursor automaticamente no primeiro campo
        }
    </script>
</body>
</html>
